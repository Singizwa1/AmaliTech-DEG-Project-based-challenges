name: CI/CD Pipeline

# Trigger on every push to main branch
on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/singizwa1/amalitech-deg-project-based-challenges

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run tests before anything else
  # If tests fail, pipeline stops completely
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js 20 environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dev-ops/DeployReady/app/package-lock.json

      # Install dependencies and run tests
      - name: Install and test
        run: |
          cd dev-ops/DeployReady/app
          npm ci
          npm test

  # ─────────────────────────────────────────
  # JOB 2: Build Docker image and push to
  # GitHub Container Registry (ghcr.io)
  # Only runs if tests pass
  # ─────────────────────────────────────────
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      # Uses REGISTRY_TOKEN secret — never hardcoded
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      # Build and push image with two tags:
      # 1. commit SHA for exact version tracking
      # 2. latest always points to newest image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: dev-ops/DeployReady
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────
  # JOB 3: Deploy to EC2 via AWS SSM
  # No SSH needed — uses AWS secure channel
  # Only runs if build-and-push passes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure AWS credentials for SSM access
      # Uses secrets — never hardcoded
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Send deployment commands to EC2 via SSM
      # No port 22 needed — uses AWS secure channel
      - name: Deploy via AWS SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker pull ${{ env.IMAGE_NAME }}:latest",
              "docker stop app || true",
              "docker rm app || true",
              "docker run -d --name app --restart unless-stopped -p 80:3000 -e PORT=3000 -e NODE_ENV=production ${{ env.IMAGE_NAME }}:latest",
              "sleep 5",
              "curl -f http://localhost/health || (docker stop app && docker rm app && docker run -d --name app --restart unless-stopped -p 80:3000 -e PORT=3000 ${{ env.IMAGE_NAME }}:${{ github.sha }} && exit 1)"
            ]' \
            --region ${{ secrets.AWS_REGION }}

      # Wait and verify deployment was successful
      - name: Verify deployment
        run: |
          sleep 15
          curl -f http://${{ secrets.EC2_HOST }}/health